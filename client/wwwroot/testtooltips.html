<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MorphCharts — 3D Bar Chart with Tooltips</title>
    <script>
    // On localhost Vite resolves bare specifiers via npm workspaces — no import map needed.
    // On production (GitHub Pages) inject a CDN import map.
    const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (!isDev) {
        const importMap = document.createElement('script');
        importMap.type = 'importmap';
        importMap.textContent = JSON.stringify({
            imports: {
                "core": "https://microsoft.github.io/morphcharts/lib/morphcharts-core.js",
                "spec": "https://microsoft.github.io/morphcharts/lib/morphcharts-spec.js",
                "webgpuraytrace": "https://microsoft.github.io/morphcharts/lib/morphcharts-webgpuraytrace.js"
            }
        });
        document.currentScript.after(importMap);
    }
    </script>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        .canvasContainer {
            position: relative;
            display: inline-block;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .tooltip {
            display: none;
            position: absolute;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }

        .status {
            color: #aaa;
            padding: 8px;
            font-size: 0.85em;
        }
    </style>
</head>

<body>
    <div class="canvasContainer" id="canvasContainer">
        <canvas id="canvas" width="1280" height="720"></canvas>
        <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="status" id="status">Initializing…</div>

    <script type="module">
        import * as Core from 'core';
        import * as Spec from 'spec';
        import * as WebGPURenderer from 'webgpuraytrace';

        const canvas = document.getElementById('canvas');
        const tooltip = document.getElementById('tooltip');
        const canvasContainer = document.getElementById('canvasContainer');
        const status = document.getElementById('status');

        // -----------------------------------------------------------
        // 1. Spec — a 3D bar chart with segment IDs for picking
        // -----------------------------------------------------------
        const specJSON = {
            "width": 640,
            "height": 360,
            "camera": { "position": [0, 0.6, 1.2] },
            "data": [
                {
                    "name": "table",
                    "values": [
                        { "category": "A", "amount": 42 },
                        { "category": "B", "amount": 87 },
                        { "category": "C", "amount": 15 },
                        { "category": "D", "amount": 63 },
                        { "category": "E", "amount": 29 },
                        { "category": "F", "amount": 91 },
                        { "category": "G", "amount": 8 },
                        { "category": "H", "amount": 76 },
                        { "category": "I", "amount": 54 },
                        { "category": "J", "amount": 33 }
                    ]
                }
            ],
            "scales": [
                {
                    "name": "xscale",
                    "type": "band",
                    "domain": { "data": "table", "field": "category" },
                    "range": "width",
                    "padding": 0.25
                },
                {
                    "name": "yscale",
                    "type": "linear",
                    "domain": { "data": "table", "field": "amount" },
                    "nice": true,
                    "range": "height"
                },
                {
                    "name": "fillscale",
                    "type": "linear",
                    "domain": { "data": "table", "field": "amount" },
                    "nice": true,
                    "range": { "scheme": "blues" }
                }
            ],
            "axes": [
                {
                    "orient": "bottom",
                    "scale": "xscale",
                    "labelBaseline": "top",
                    "labelOffsetY": 0.1,
                    "labelOffsetZ": 32,
                    "labelAngleX": 90,
                    "title": "Category",
                    "titleOffsetZ": 64,
                    "titleOffsetY": 0.1,
                    "titleAngleX": 90,
                    "domain": false
                },
                {
                    "orient": "left",
                    "orientZ": "back",
                    "scale": "yscale",
                    "grid": true,
                    "gridWidth": 0.1,
                    "tickCount": 10,
                    "labelAlign": "right",
                    "labelOffsetX": -2,
                    "labelOffsetY": 4,
                    "title": "Amount",
                    "titleOffsetX": -32,
                    "titleAngle": -90
                }
            ],
            "marks": [
                {
                    "type": "rect",
                    "geometry": "xzrect",
                    "material": "glossy",
                    "encode": {
                        "enter": {
                            "xc": { "signal": "width/2" },
                            "width": { "signal": "width*2" },
                            "depth": { "signal": "width*2" },
                            "fuzz": { "value": 0.1 },
                            "fill": { "value": "white" }
                        }
                    }
                },
                {
                    "type": "rect",
                    "geometry": "cylindersdf",
                    "material": "glossy",
                    "from": { "data": "table" },
                    "encode": {
                        "enter": {
                            "x": { "scale": "xscale", "field": "category" },
                            "width": { "scale": "xscale", "band": 1 },
                            "y": { "scale": "yscale", "value": 0 },
                            "y2": { "scale": "yscale", "field": "amount" },
                            "fuzz": { "value": 0.1 },
                            "rounding": { "scale": "xscale", "band": 0.025 },
                            "fill": { "scale": "fillscale", "field": "amount" }
                        }
                    }
                },
                {
                    "type": "text",
                    "from": { "data": "table" },
                    "encode": {
                        "enter": {
                            "align": { "value": "center" },
                            "baseline": { "value": "bottom" },
                            "x": { "scale": "xscale", "field": "category", "band": 0.5 },
                            "y": { "scale": "yscale", "field": "amount" },
                            "stroke": { "value": "white" },
                            "strokeWidth": { "value": 0.5 },
                            "text": { "field": "amount" }
                        }
                    }
                }
            ]
        };

        // -----------------------------------------------------------
        // Tooltip field definitions — controls which fields appear
        // and how they are displayed.  Optional "format" uses
        // Intl.NumberFormat options, e.g. { maximumFractionDigits: 0 }.
        // -----------------------------------------------------------
        const tooltipFields = [
            { field: 'category', label: 'Category' },
            { field: 'amount', label: 'Amount', format: { maximumFractionDigits: 0 } },
        ];

        function formatValue(value, fmt) {
            if (!fmt) return value;
            const n = Number(value);
            if (isNaN(n)) return value;
            return new Intl.NumberFormat(undefined, fmt).format(n);
        }

        // -----------------------------------------------------------
        // 2. Create and initialize the main (raytrace) renderer
        // -----------------------------------------------------------
        status.textContent = 'Initializing renderer…';
        const renderer = new WebGPURenderer.Main(canvas);
        await renderer.initializeAsync();

        // Parse the spec and create the scene
        const plot = await Spec.Plot.fromJSONAsync(specJSON);
        const scene = await plot.createSceneAsync();
        renderer.loadScene(scene);

        // -----------------------------------------------------------
        // 3. Create a segment renderer, render one frame
        // -----------------------------------------------------------
        status.textContent = 'Rendering segment map…';
        const segmentCanvas = document.createElement('canvas');
        segmentCanvas.width = canvas.width;
        segmentCanvas.height = canvas.height;

        const segmentRenderer = new WebGPURenderer.Main(segmentCanvas, {
            renderMode: 'segment',
        });
        segmentRenderer.idSource = 'pick';
        await segmentRenderer.initializeAsync();

        // Share the same scene between both renderers
        segmentRenderer.loadScene(scene);
        segmentRenderer.copyCamera(scene.camera);

        // Render a single segment frame
        await segmentRenderer.updateAsync(0);
        await segmentRenderer.renderAsync(0);

        // Read back the segment pixels via a 2D canvas
        const readbackCanvas = document.createElement('canvas');
        readbackCanvas.width = canvas.width;
        readbackCanvas.height = canvas.height;
        const readbackCtx = readbackCanvas.getContext('2d');
        readbackCtx.drawImage(segmentCanvas, 0, 0);
        const segmentPixels = readbackCtx.getImageData(0, 0, canvas.width, canvas.height).data;

        // -----------------------------------------------------------
        // 4. Run the main raytrace render loop
        // -----------------------------------------------------------
        status.textContent = 'Rendering…';
        const maxSamples = 500;
        let previousTime = performance.now();

        function tick(currentTime) {
            const elapsed = currentTime - previousTime;
            previousTime = currentTime;
            renderer.updateAsync(elapsed);
            renderer.renderAsync(elapsed);
            status.textContent = 'Frame ' + renderer.frameCount + ' / ' + maxSamples;
            if (renderer.frameCount < maxSamples) {
                requestAnimationFrame(tick);
            } else {
                status.textContent = 'Rendering complete (' + renderer.frameCount + ' frames). Hover over a bar to see a tooltip.';
            }
        }
        requestAnimationFrame(tick);

        // -----------------------------------------------------------
        // 5. Tooltip — look up pick ID on mouse move, map to segment ID
        // -----------------------------------------------------------
        canvas.addEventListener('mousemove', function (e) {
            const rect = canvas.getBoundingClientRect();
            const px = Math.floor(((e.clientX - rect.left) / rect.width) * canvas.width);
            const py = Math.floor(((e.clientY - rect.top) / rect.height) * canvas.height);

            if (px < 0 || px >= canvas.width || py < 0 || py >= canvas.height) {
                tooltip.style.display = 'none';
                return;
            }

            // Read RGB from segment image, decode to pick ID.
            // Alpha is forced to 0 because the renderer outputs 1.0 but
            // the encoding stores the ID across R, G, B only for IDs < 16 777 216.
            const offset = (py * canvas.width + px) * 4;
            const color = [segmentPixels[offset] / 255, segmentPixels[offset + 1] / 255, segmentPixels[offset + 2] / 255, 0];
            const pickId = Core.Color.colorRGBAToNumber(color);

            // Map pick ID → { dataset, rowIndex } via the Pick registry
            const info = Core.Pick.get(pickId);
            if (!info || info.rowIndex < 0 || info.rowIndex >= info.dataset.rows.length) {
                tooltip.style.display = 'none';
                return;
            }
            const { dataset, rowIndex } = info;
            const row = dataset.rows[rowIndex];

            // Build tooltip lines only for fields that exist in this dataset
            const lines = [];
            for (const f of tooltipFields) {
                const col = dataset.headings.indexOf(f.field);
                if (col < 0) continue;
                const value = row[col];
                if (value === undefined || value === null) continue;
                lines.push((f.label || f.field) + ': ' + formatValue(value, f.format));
            }
            if (lines.length === 0) {
                tooltip.style.display = 'none';
                return;
            }
            const html = lines.join('<br>');

            // Position the tooltip's bottom-left corner just above the cursor
            tooltip.innerHTML = html;
            tooltip.style.display = 'block';
            const tipRect = tooltip.getBoundingClientRect();
            tooltip.style.left = (e.clientX - rect.left) + 'px';
            tooltip.style.top  = (e.clientY - rect.top - tipRect.height - 8) + 'px';
        });

        canvas.addEventListener('mouseleave', function () {
            tooltip.style.display = 'none';
        });
    </script>
</body>
</html>
